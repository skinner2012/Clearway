# OTel Collector — receive OTLP/HTTP metrics + traces from the app.
# This is the buffer that outlives the short-lived `clearway run` CLI: the app pushes
# and exits; the collector holds the last metric values until Prometheus scrapes them, and
# echoes spans to its own log (a real trace backend like Grafana Tempo is deferred — ARCHITECTURE
# §4.5; the `traces` pipeline exports to `debug` so the run/finding/step tree is still observable).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Expose received metrics at :8889/metrics for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Echo to the collector log — handy when validating the pipeline hop-by-hop.
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus, debug]
    # Spans land here → echoed to the collector log (no trace backend yet — see the header note).
    traces:
      receivers: [otlp]
      exporters: [debug]
