# Load any dashboard JSON under /var/lib/grafana/dashboards (mounted from the repo),
# so the exit-criterion panel exists on every fresh `up` — no hand-clicking.
apiVersion: 1

providers:
  - name: Clearway
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
