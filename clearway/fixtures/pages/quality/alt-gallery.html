<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>City Photo Gallery</title>
</head>
<body>
  <main>
    <h1>City Photo Gallery</h1>

    <!-- adequate: names the subject and the distinguishing detail -->
    <img id="shot1" src="/img/ggb.jpg" alt="Golden Gate Bridge at sunset, half-wrapped in fog" width="500" height="333">

    <!-- inadequate: generic word -->
    <img id="shot2" src="/img/street.jpg" alt="photo" width="500" height="333">

    <!-- borderline/inadequate: describes the interaction, not the image content -->
    <img id="shot3" src="/img/market.jpg" alt="click to enlarge" width="500" height="333">
  </main>
</body>
</html>
