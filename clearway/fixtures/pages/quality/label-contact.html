<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact us</title>
</head>
<body>
  <main>
    <h1>Contact us</h1>
    <!-- label quality on a gradient (adequate -> adequate -> inadequate), each field labelled so
         axe's label rule PASSES on existence. Section heading "Contact details" is the injected
         section-context referent. -->
    <h2>Contact details</h2>
    <label for="c_email">Email address</label>
    <input id="c_email" type="email">
    <label for="c_phone">Phone number</label>
    <input id="c_phone" type="tel">
    <label for="c_info">Info</label>
    <input id="c_info" type="text">
  </main>
</body>
</html>
