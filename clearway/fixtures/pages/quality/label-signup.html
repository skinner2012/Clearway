<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Create your account</title>
</head>
<body>
  <main>
    <h1>Create your account</h1>
    <!-- label quality: one clear label and two generic ones, each field labelled so axe's label
         rule PASSES on existence. Section heading "Account details" is the injected referent. -->
    <h2>Account details</h2>
    <label for="s_user">Username</label>
    <input id="s_user" type="text">
    <label for="s_val">Value</label>
    <input id="s_val" type="text">
    <label for="s_text">Text</label>
    <input id="s_text" type="text">
  </main>
</body>
</html>
