# OTel Collector — receive OTLP/HTTP metrics + traces from the app.
# This is the buffer that outlives the short-lived `clearway run` CLI: the app pushes
# and exits; the collector holds the last metric values until Prometheus scrapes them, and
# forwards spans to Grafana Tempo so the run/finding/step tree — and the
# cross-boundary MCP child span — is queryable by trace_id, not just echoed to the log.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Expose received metrics at :8889/metrics for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Forward spans to Tempo over OTLP/gRPC so they're queryable as a trace tree.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Echo to the collector log — handy when validating the pipeline hop-by-hop.
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus, debug]
    # Spans fan out to Tempo (queryable trace tree) and the debug log (hop-by-hop validation).
    traces:
      receivers: [otlp]
      exporters: [otlp/tempo, debug]
